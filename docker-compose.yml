services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pocketaccountant-postgres
    environment:
      POSTGRES_DB: pocketaccountant
      POSTGRES_USER: pocketadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - pocketaccountant-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pocketadmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # n8n Workflow Engine
  n8n:
    image: n8nio/n8n:latest
    container_name: pocketaccountant-n8n
    environment:
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme123456789012345678901234}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=pocketaccountant
      - DB_POSTGRESDB_USER=pocketadmin
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-changeme123}
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_DEFAULT_METRICS=true
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - GENERIC_TIMEZONE=Africa/Johannesburg
      - N8N_USER_FOLDER=/home/node/.n8n
      - WEBHOOK_URL=http://localhost:5678/
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/.n8n/workflows
    networks:
      - pocketaccountant-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Adminer (Database Management UI - Optional)
  adminer:
    image: adminer:latest
    container_name: pocketaccountant-adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - pocketaccountant-network
    depends_on:
      - postgres

networks:
  pocketaccountant-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local